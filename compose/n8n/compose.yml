services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${HOST_IP}
      - N8N_PORT=5678
      - N8N_PATH=/n8n/
      - N8N_PROTOCOL=http
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENABLE_EXECUTE_COMMAND=false
      - N8N_BLOCK_ENV_VARS_IN_EXECUTE_COMMAND=true
      - NODE_ENV=production
      - N8N_EDITOR_BASE_URL=http://${HOST_IP}/n8n/
      - WEBHOOK_URL=http://${HOST_IP}/n8n/
      - N8N_SECURE_COOKIE=true
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - default
      - web

volumes:
  n8n_data:

networks:
  web:
    external: true
