services:
  gokapi:
    image: f0rc3/gokapi:v1.9.6
    container_name: gokapi
    restart: unless-stopped
    environment:
      - TZ=${GENERIC_TIMEZONE}
    volumes:
      - gokapi_data:/app/data
      - gokapi_config:/app/config
    networks:
      - default
      - web

volumes:
  gokapi_data:
  gokapi_config:

networks:
  web:
    external: true
