services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    environment:
      - TZ=${GENERIC_TIMEZONE}
    volumes:
      - metube_downloads:/downloads
    networks:
      - default
      - web

volumes:
  metube_downloads:

networks:
  web:
    external: true
