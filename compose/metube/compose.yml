services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - TZ=${GENERIC_TIMEZONE}
      - URL_PREFIX=/metube
      - CHOWN_DIRS=false
    volumes:
      - metube_downloads:/downloads
    networks:
      - default
      - web

volumes:
  metube_downloads:

networks:
  web:
    external: true
