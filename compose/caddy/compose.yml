services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    environment:
      - HOST_IP=${HOST_IP}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../html:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    external: true
